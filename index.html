<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr.Yogi Premium</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a1a2f, #000);
    color: white;
    text-align: center;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
}

.logo {
    height: 40px;
}

.menu {
    font-size: 24px;
    cursor: pointer;
}

/* HERO */
.hero {
    padding: 50px 20px;
}

.tag {
    background: rgba(255,255,255,0.1);
    padding: 8px 15px;
    border-radius: 20px;
    display: inline-block;
    font-size: 12px;
}

h1 {
    font-size: 32px;
    margin: 20px 0;
    line-height: 1.3;
}

p {
    color: #aaa;
    font-size: 14px;
    max-width: 400px;
    margin: auto;
}

/* BUTTONS */
.btn-main {
    background: red;
    padding: 15px 30px;
    border-radius: 30px;
    margin-top: 25px;
    display: inline-block;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.btn-sec {
    margin-top: 15px;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: white;
}

/* FEATURES */
.features {
    margin-top: 40px;
}

.feature-box {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    font-size: 12px;
}
</style>
</head>

<body>

<header>
    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- MENU -->
    <div class="menu">☰</div>
</header>

<section class="hero">

<div class="tag">🟢 TRUSTED BY 10,000+ INDIANS</div>

<h1>
Premium OTT & Tools.<br>
Simple. Affordable.<br>
Trusted.
</h1>

<p>
Unlock your favorite premium subscriptions instantly at the best prices.
Zero hidden fees. Fully secure. Trusted by thousands.
</p>

<a href="#" class="btn-main">View Plans →</a><br>
<a href="#" class="btn-sec">See Reviews</a>

<div class="features">
    <div class="feature-box">🔐 Secure Payments</div>
    <div class="feature-box">⚡ Instant Access</div>
    <div class="feature-box">💬 24/7 Support</div>
</div>

</section>

</body>
</html>
